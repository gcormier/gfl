name: PR Preview

# Builds a live preview of the site for each PR and deploys it to a dedicated
# subfolder on the gh-pages branch (pr-preview/pr-{number}/). Posts a sticky
# comment on the PR with the preview URL; removes it when the PR is closed.
#
# Requires the repo's GitHub Pages source to be set to the gh-pages branch
# (Settings → Pages → Source: Deploy from a branch → gh-pages / root).
#
# Fork PRs are skipped: pull_request events from forks run with read-only
# permissions and cannot push to gh-pages or comment on PRs.

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write      # push to gh-pages branch
  pull-requests: write # post / update the preview comment

concurrency:
  group: pr-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    # Fork PRs: pull_request from a fork runs with read-only permissions (no
    # secrets), so we'd fail trying to push or comment. Skip gracefully.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      # Build steps are only needed when deploying, not when cleaning up a
      # closed PR (rossjrw/pr-preview-action handles cleanup from gh-pages).
      - name: Set up uv
        if: github.event.action != 'closed'
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install generator dependencies
        if: github.event.action != 'closed'
        working-directory: hardware-gen
        run: uv sync

      - name: Compute stdlib git SHA
        id: stdlib-sha
        if: github.event.action != 'closed'
        run: echo "sha=$(git log -1 --format=%h -- hardware-gen/ hardware-gen/output/)" >> $GITHUB_OUTPUT

      # Generate the same catalogs pages.yml produces at deploy time. This
      # gives the preview a fully working standards list and custom-icons set,
      # built from the PR branch's source files.
      - name: Generate standards.json and custom-icons.json
        if: github.event.action != 'closed'
        working-directory: hardware-gen
        env:
          GIT_STDLIB_SHA: ${{ steps.stdlib-sha.outputs.sha }}
        run: |
          uv run python generate_standards_json.py
          uv run python generate_custom_icons.py

      # Stamp a preview-specific version so the topbar pill and contribute.html
      # make it obvious this is a preview, not the live site.
      - name: Inject preview version
        if: github.event.action != 'closed'
        run: |
          VER="pr-${{ github.event.number }}+$(git rev-parse --short HEAD)"
          printf '%s' "$VER" > VERSION
          sed -i "s/const APP_VERSION = '[^']*';/const APP_VERSION = '$VER';/" app.js

      # Deploy the built site into pr-preview/pr-{number}/ on the gh-pages
      # branch, and post/update a comment on the PR with the preview URL.
      # On PR close, removes the subfolder and updates the comment.
      #
      # The app uses location.pathname as its asset base (see app.js:BASE), so
      # all fetches (standards.json, custom-icons.json, hardware SVGs) resolve
      # relative to the preview subfolder — no hardcoded paths to fix.
      - name: Deploy / remove PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: .
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          token: ${{ secrets.GITHUB_TOKEN }}
