name: hardware-gen

on:
  # push is scoped to main so feature-branch pushes don't double-run alongside
  # the PR's pull_request event. Merge to main has no associated PR, so this is
  # where the publish path (commit SVGs + dispatch pages) runs.
  push:
    branches: [main]
    paths:
      - "hardware-gen/config/**"
      - "hardware-gen/freecad_scripts/**"
      - "hardware-gen/pipeline/**"
      - "hardware-gen/generate_custom_icons.py"
      - "images/custom/**"
      - "custom-icons.json"
      - ".github/workflows/hardware-gen.yml"
  pull_request:
    paths:
      - "hardware-gen/config/**"
      - "hardware-gen/freecad_scripts/**"
      - "hardware-gen/pipeline/**"
      - "hardware-gen/generate_custom_icons.py"
      - "images/custom/**"
      - "custom-icons.json"
      - ".github/workflows/hardware-gen.yml"
  workflow_dispatch:
    inputs:
      config_file:
        description: "YAML config to process (leave empty to run all)"
        required: false
        default: ""

# Only run one pipeline at a time per branch to avoid clobbering the
# artifact cache. Concurrent runs on other branches are still allowed.
concurrency:
  group: hardware-gen-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & type-check (no FreeCAD needed) ──────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hardware-gen

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dev dependencies
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Mypy type check
        run: uv run mypy generate.py pipeline/

  # ── Dry-run (parses YAML, resolves standards — no FreeCAD needed) ──────────
  dry-run:
    name: Dry-run (YAML validation)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: hardware-gen

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install runtime dependencies
        run: uv sync

      - name: Dry-run all configs
        run: uv run generate.py --dry-run --verbose

      # standards.json / custom-icons.json are generated at deploy time (pages.yml),
      # not stored in git — so there is no committed file to diff against. We still
      # run the generators here as a validation gate: they parse the source YAML and
      # validate every SVG's metadata, exiting non-zero on any malformed input.
      - name: Validate standards sources (config/*.yaml)
        run: uv run python generate_standards_json.py

      - name: Validate custom icon sources (SVG metadata)
        run: uv run python generate_custom_icons.py

  # ── Full generation (requires FreeCAD) ────────────────────────────────────
  generate:
    name: Generate 3D + 2D artifacts
    runs-on: ubuntu-latest
    needs: dry-run
    permissions:
      contents: write
      actions: write          # allows dispatching pages.yml after committing SVGs
    env:
      FREECAD_APPIMAGE_URL: "https://github.com/FreeCAD/FreeCAD/releases/download/1.1.1/FreeCAD_1.1.1-Linux-x86_64-py311.AppImage"
    defaults:
      run:
        working-directory: hardware-gen

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install runtime dependencies
        run: uv sync

      - name: Cache FreeCAD AppImage
        id: cache-freecad
        uses: actions/cache@v4
        with:
          path: /opt/freecad
          key: freecad-appimage-${{ env.FREECAD_APPIMAGE_URL }}

      - name: Download and extract FreeCAD AppImage
        if: steps.cache-freecad.outputs.cache-hit != 'true'
        working-directory: /tmp
        run: |
          wget -q -O freecad.appimage "$FREECAD_APPIMAGE_URL"
          chmod +x freecad.appimage
          ./freecad.appimage --appimage-extract
          sudo mv squashfs-root /opt/freecad

      - name: Set cache week key
        id: week
        run: echo "key=$(date +%Y-%U)" >> "$GITHUB_OUTPUT"

      - name: Cache Fasteners workbench
        id: cache-fasteners
        uses: actions/cache@v4
        with:
          path: ~/.local/share/FreeCAD/Mod/Fasteners
          key: fasteners-wb-${{ runner.os }}-${{ steps.week.outputs.key }}

      - name: Install Fasteners workbench
        if: steps.cache-fasteners.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$HOME/.local/share/FreeCAD/Mod"
          git clone --depth=1 https://github.com/shaise/FreeCAD_FastenersWB.git \
              "$HOME/.local/share/FreeCAD/Mod/Fasteners"

      - name: Set FREECADCMD path
        run: echo "FREECADCMD=/opt/freecad/usr/bin/freecadcmd" >> "$GITHUB_ENV"

      # Authoritative "Both" recheck: the committed pipeline/fastener_types.json
      # powers the fast no-FreeCAD validation gate (lint/dry-run); here, where
      # FreeCAD is present, confirm it still matches the installed workbench so
      # it can't silently go stale after a FreeCAD/Fasteners upgrade.
      - name: Recheck fastener-types snapshot against the live workbench
        env:
          QT_QPA_PLATFORM: offscreen
          HW_GEN_PARAMS: '{"mode":"check","path":"pipeline/fastener_types.json"}'
        run: $FREECADCMD freecad_scripts/dump_fastener_types.py

      - name: Generate hardware artifacts
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          CONFIG="${{ github.event.inputs.config_file }}"
          if [ -n "$CONFIG" ]; then
              uv run generate.py --verbose "$CONFIG"
          else
              uv run generate.py --verbose
          fi

      - name: Upload build artifacts (STEP files)
        uses: actions/upload-artifact@v4
        with:
          name: hardware-step-${{ github.sha }}
          path: hardware-gen/build/*.step
          if-no-files-found: warn
          retention-days: 30

      - name: Upload output artifacts (SVG files)
        uses: actions/upload-artifact@v4
        with:
          name: hardware-svg-${{ github.sha }}
          path: hardware-gen/output/*.svg
          if-no-files-found: warn
          retention-days: 30

      # Publish step — gated to non-PR events. On a PR the steps above still run
      # (render + upload artifacts) to verify the geometry builds, but we never
      # commit or deploy: a PR checkout is a detached merge ref, and deploying
      # would ship unreviewed changes. Runs on push-to-main and workflow_dispatch.
      - name: Commit generated SVGs to repo for GitHub Pages
        if: github.event_name != 'pull_request'
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage adds, modifications, AND deletions in one go. -A on the
          # directory drops renders whose source standard was removed, while
          # picking up new/changed SVGs — without the working-tree-deleting
          # footgun of `git rm` (which would wipe the freshly generated files
          # before they could be re-added).
          git add -A hardware-gen/output
          if git diff --cached --quiet; then
            echo "No SVG changes to commit."
          else
            git commit -m "chore: update generated SVGs [skip ci]"
            git push
            # The commit above uses GITHUB_TOKEN, whose pushes never trigger new
            # workflow runs (recursion guard) — and [skip ci] would suppress them
            # anyway. workflow_dispatch is exempt from that guard, so explicitly
            # dispatch the deploy to ship the new SVGs to Pages.
            echo "Dispatching Pages deploy for updated SVGs..."
            gh workflow run pages.yml --ref main
          fi
