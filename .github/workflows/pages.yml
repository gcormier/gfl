name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'print-agent/**'
      - 'agents.md'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - '.gitignore'
      # Render-pipeline source that never affects a deploy-time build — the
      # committed SVGs it produces are regenerated by hardware-gen.yml, which
      # dispatches its own Pages deploy afterward. (Do NOT add config/** or
      # pipeline/** here: the deploy step reads config and pipeline/models.py
      # to build standards.json.)
      - 'hardware-gen/freecad_scripts/**'
      - 'hardware-gen/generate.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      # Generated catalogs are NOT stored in git (single source of truth lives in
      # hardware-gen/config/*.yaml and images/custom/*.svg). Build them here so the
      # deployed site has them, without making them a PR merge surface.
      - name: Install generator dependencies
        working-directory: hardware-gen
        run: uv sync

      - name: Compute stdlib git SHA
        id: stdlib-sha
        run: echo "sha=$(git log -1 --format=%h -- hardware-gen/ hardware-gen/output/)" >> $GITHUB_OUTPUT

      - name: Generate standards.json and custom-icons.json
        working-directory: hardware-gen
        env:
          GIT_STDLIB_SHA: ${{ steps.stdlib-sha.outputs.sha }}
        run: |
          uv run python generate_standards_json.py
          uv run python generate_custom_icons.py

      # Version is display-only (topbar pill + contribute.html). It is DERIVED
      # here from the deployed commit, never hand-bumped — so it can't become a
      # merge surface across concurrent PRs. VERSION + APP_VERSION ship as a
      # static 'dev' placeholder in git and are overwritten in the artifact only.
      - name: Inject deploy version (date + short SHA)
        run: |
          VER="$(git log -1 --format=%cd --date=format:%Y.%m.%d)+$(git rev-parse --short HEAD)"
          echo "Deploy version: $VER"
          printf '%s' "$VER" > VERSION
          sed -i "s/const APP_VERSION = '[^']*';/const APP_VERSION = '$VER';/" app.js

      # Deploy to the gh-pages branch. clean-exclude preserves any PR preview
      # subfolders that pr-preview.yml has written under pr-preview/; without it,
      # every main-branch deploy would wipe active previews.
      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: true
          clean-exclude: |
            pr-preview/
