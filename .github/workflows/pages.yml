name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'print-agent/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      # Generated catalogs are NOT stored in git (single source of truth lives in
      # hardware-gen/config/*.yaml and images/custom/*.svg). Build them here so the
      # deployed site has them, without making them a PR merge surface.
      - name: Install generator dependencies
        working-directory: hardware-gen
        run: uv sync

      - name: Generate standards.json and custom-icons.json
        working-directory: hardware-gen
        run: |
          uv run python generate_standards_json.py
          uv run python generate_custom_icons.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v4
        id: deployment
