name: code-checks

# Verification for *code* PRs (frontend + print agent). This workflow triggers
# on EVERY pull request (and every push to main) — not just code paths — so that
# its required status check ("code-checks gate") is always reported. A required
# check that is never reported stays "Expected" forever and blocks the PR; that
# is exactly what path-filtered triggers cause for an unrelated (e.g. hardware)
# PR. Instead we trigger always, detect relevance in the `changes` job, and skip
# the heavy jobs when no code paths changed. Skipped jobs count as passing, so a
# hardware-only PR sails through this gate while a code PR must actually pass it.
# Heavy work still only runs when relevant, keeping hardware-gen.yml's lane clear.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: code-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Relevance detection (near-instant; the only job that always does work) ──
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - "*.js"
              - "*.html"
              - "*.css"
              - "print-agent/**"
              - "tests/**"
              - ".github/workflows/code-checks.yml"

  # ── Frontend JS syntax check + unit tests (no build step in this repo) ─────
  js:
    name: JS syntax check & unit tests
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # node --check parses every module without executing it — catches syntax
      # errors (incl. in the web worker) before they ship to Pages. No deps,
      # no config: the repo is intentionally build-free.
      - name: node --check all *.js
        run: |
          shopt -s nullglob
          fail=0
          for f in *.js; do
            echo "Checking $f"
            node --check "$f" || fail=1
          done
          exit $fail

      # Unit tests for the pure image-trace pipeline, via Node's built-in runner
      # (node:test / node:assert) — still zero deps, no framework, no build step.
      - name: node --test (unit tests)
        run: node --test tests/*.test.js

  # ── Print agent lint (Python, PEP 723 inline-metadata script) ──────────────
  # Lint only — no version-bump gate. A hand-edited monotonic version line would
  # be a merge surface across concurrent PRs (the same reason standards.json and
  # the web VERSION are generated, not authored — see agents.md).
  print-agent:
    name: Print agent lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      # F (pyflakes) + B (bugbear) only: catch real problems — undefined names,
      # unused imports, broken f-strings, likely bugs. We deliberately skip the
      # stylistic/modernization rules (E pycodestyle, UP pyupgrade, I isort) so
      # the gate doesn't retroactively fail a working script over intentional
      # style (e.g. the compact `if flag: append()` status decoder).
      - name: Ruff lint (real-bug classes)
        run: uvx ruff check --select F,B print-agent/agent.py

  # ── Guard: deploy-generated files must never be committed ──────────────────
  # standards.json / custom-icons.json / VERSION are written at deploy time
  # (pages.yml) and are .gitignore'd. If a PR force-adds one it becomes a merge
  # surface and a stale-data risk — fail fast.
  no-generated-artifacts:
    name: No generated artifacts
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assert generated files are untracked
        run: |
          tracked="$(git ls-files standards.json custom-icons.json VERSION)"
          if [ -n "$tracked" ]; then
            echo "::error::These files are generated at deploy time and must not be committed:"
            echo "$tracked"
            echo "They are .gitignore'd — remove them from the index (git rm --cached)."
            exit 1
          fi
          echo "OK — no generated files tracked."

  # ── Required status check (always reports; mark THIS in branch protection) ──
  # Runs even when the jobs above are skipped (if: always()), and fails only if a
  # job it depends on actually failed or was cancelled — "skipped" and "success"
  # both pass. This is the single stable context branch protection requires for
  # code; it turns "the relevant jobs passed (or didn't need to run)" into one
  # green check, so a hardware-only PR isn't blocked waiting on code checks.
  gate:
    name: code-checks gate
    if: always()
    needs: [changes, js, print-agent, no-generated-artifacts]
    runs-on: ubuntu-latest
    steps:
      - name: Verify no required job failed
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "Job results: $results"
          for r in $results; do
            case "$r" in
              failure|cancelled)
                echo "::error::A required code check did not pass."
                exit 1 ;;
            esac
          done
          echo "OK — code checks passed or were not applicable to this PR."
