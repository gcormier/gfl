# Washers. hardware_type "washer" is inferred from this filename.

standards:
  - id: iso7089
    description: "Plain washers - Normal series - Product grade A"
    designations:
      - { system: ISO, code: "7089" }
      - { system: DIN, code: "125" }
    renders:
      - size: M8
        # No length for washers; the workbench derives thickness from the standard.
        views: [top]

  # Catalog-only — the FreeCAD Fasteners workbench ships no split/spring lock
  # washer (its Washer category is plain washers only), so this can't render.
  - id: din127
    description: "Spring lock washers (split lock washers) for hexagon head screws"
    designations:
      - { system: DIN, code: "127" }

  # Catalog-only — bent/saddle-type spring lock washer; no ISO equivalent.
  - id: din128a
    description: "Spring lock washers, bent type (saddle lock washers)"
    designations:
      - { system: DIN, code: "128A" }

  # Catalog-only — conical disc spring (Belleville washer); DIN 2093 is the
  # primary dimensional standard; ISO 16983/16984 cover delivery and quality.
  - id: din2093
    description: "Disc springs (Belleville washers)"
    designations:
      - { system: DIN, code: "2093" }
      - { system: ISO, code: "16983" }
