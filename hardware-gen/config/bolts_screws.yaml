fasteners:

  - name: "SocketCap"
    standard: "ISO4762"   # DIN912 is the equivalent but ISO is preferred
    size: "M4"
    length: 20
    pipeline:
      export_3d: "step"
      export_2d_views: ["iso", "top", "side"]

  - name: "ButtonHead"
    standard: "ISO7380-1"
    size: "M4"
    length: 10
    pipeline:
      export_3d: "step"
      export_2d_views: ["iso", "top", "side"]

  - name: "ButtonHeadFlange"
    standard: "ISO7380-2"
    size: "M4"
    length: 10
    pipeline:
      export_3d: "step"
      export_2d_views: ["iso", "top", "side"]