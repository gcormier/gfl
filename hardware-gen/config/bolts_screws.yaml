fasteners:

  - name: "M8x10_SocketCap"
    standard: "ISO4762"   # DIN912 is the equivalent but ISO is preferred
    size: "M8"
    length: 20
    pipeline:
      export_3d: "step"
      export_2d_views: ["iso", "top", "side"]

  - name: "M8x10_ButtonHead"
    standard: "ISO7380-1"
    size: "M8"
    length: 10
    pipeline:
      export_3d: "step"
      export_2d_views: ["iso", "top", "side"]

