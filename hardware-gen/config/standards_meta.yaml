# Standard-class metadata for the Gridfinity Label Generator web app.
#
# This file is the single source of truth for hardware standards.
# Run `python generate_standards_json.py` from hardware-gen/ to regenerate
# the root standards.json consumed by the frontend.
#
# Fields:
#   id            - Lowercase ISO code (matches jscad ID and image filename stem)
#   primary_system - DIN or ISO (which system is the canonical name)
#   description   - Human-readable description shown in the web catalog
#   hardware_type - screw | nut | washer
#   designations  - Cross-reference list (system + code pairs)
#   image         - Absolute web path to the catalog image
#   jscad         - ID passed to registerJscadStandard() in standards-jscad/

standards:
  - id: iso10511
    primary_system: DIN
    description: "Fasteners - Prevailing torque hexagon nuts - Thin nuts (with non-metallic insert)"
    hardware_type: nut
    designations:
      - system: ISO
        code: "10511"
      - system: DIN
        code: "985"
    image: /images/standards/iso_10511.png
    jscad: iso10511

